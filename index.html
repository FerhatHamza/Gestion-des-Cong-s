<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EPSP Berriane - Connexion</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>body { font-family: 'Tajawal', sans-serif; }</style>
</head>
<body class="bg-gray-100 h-screen flex items-center justify-center">
  <div class="bg-white p-8 rounded-lg shadow-md w-96">
    <h2 class="text-2xl font-bold mb-6 text-center">Gestion des Congés</h2>
    <div class="mb-4">
      <label class="block text-gray-700">Code de connexion</label>
      <input type="password" id="code" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400">
    </div>
    <button id="loginBtn" class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700">Se connecter</button>
    <p id="error" class="text-red-500 mt-2 text-sm hidden"></p>
  </div>
  <script>
    const API = 'https://votre-worker.workers.dev/api';
    document.getElementById('loginBtn').onclick = async () => {
      const code = document.getElementById('code').value.trim();
      if (!code) return;
      const res = await fetch(`${API}/auth/login`, {
        method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({code})
      });
      const data = await res.json();
      if (res.ok) {
        localStorage.setItem('token', data.token);
        if (data.role === 'admin') location.href = 'admin.html';
        else {
          if (data.firstLogin) location.href = 'register.html';
          else location.href = 'employee.html';
        }
      } else {
        document.getElementById('error').textContent = data.error || 'Code invalide';
        document.getElementById('error').classList.remove('hidden');
      }
    };
  </script>
</body>
</html>
